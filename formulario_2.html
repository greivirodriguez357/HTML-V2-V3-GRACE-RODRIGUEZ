<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Inscripción</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<h2 style="text-align: center; color: white;">Formulario de Inscripción</h2>

<form id="miFormulario">

    <div>
        <label>Tipo de Documento:</label>
        <select required>
            <option value="">Seleccione una opción...</option>
            <option value="CC">Cédula de Ciudadania</option>
            <option value="TI">Tarjeta de identidad</option>
            <option value="CE">Cedula Extranjeria</option>
        </select>
    </div>

    <div>
        <label>Número de Documento:</label>
        <input type="text" id="documento" pattern="[0-9]+" required placeholder="Solo 10 números">
        <small class="error" id="error-documento"></small>
    </div>

    <div>
        <label>Nombres:</label>
        <input type="text" id="nombres" minlength="3" maxlength="64" required placeholder="Solo letras. min 3">
        <small class="error" id="error-nombres"></small>
    </div>

    <div>
        <label>Apellidos:</label>
        <input type="text" id="apellidos" minlength="3" maxlength="64" required placeholder="Solo letras. min 3">
        <small class="error" id="error-apellidos"></small>
    </div>

    <div>
    <label>Dirección:</label>
    <input type="text" id="direccion" minlength="5" maxlength="100" required placeholder="Ej: Calle 10 # 5-20">
    <small class="error" id="error-direccion"></small>
    </div>
    
    <div>
        <label>Correo:</label>
        <input type="email" id="correo" required placeholder="ejemplo@correo.com">
        <small class="error" id="error-correo"></small>
    </div>

    <div>
        <label>Teléfono Celular:</label>
        <input type="text" id="celular" pattern="[0-9]{10}" required placeholder="10 dígitos">
        <small class="error" id="error-celular"></small>
    </div>

    <div>
        <label>Teléfono Fijo:</label>
        <input type="text" id="telefono" pattern="[0-9]*" placeholder="Solo números. min 7">
        <small class="error" id="error-telefono"></small>
    </div>

    <div>
        <label>Usuario:</label>
        <input type="text" id="usuario" minlength="5" maxlength="15" required placeholder="5 a 15 caracteres">
        <small class="error" id="error-usuario"></small>
    </div>

    <div>
        <label>Contraseña:</label>
        <input type="password" id="password"
        pattern="^(?=.*[A-Z])(?=.*[a-z]{2,})(?=.*[0-9]{2,}).{8,}$"
        required
        placeholder="Mín 8: 1 Mayús, 2 minús, 2 núm">
        <small class="error" id="error-password"></small>
    </div>

    <div>
        <label>Hobbies:</label>
        <label><input type="checkbox" name="hobbies" value="deporte"> Deporte</label>
        <label><input type="checkbox" name="hobbies" value="musica"> Música</label>
        <label><input type="checkbox" name="hobbies" value="lectura"> Lectura</label>
        <small class="error" id="error-hobbies"></small>
    </div>

    <div>
        <label>Fecha:</label>
        <input type="date" id="fecha" required>
        <small class="error" id="error-fecha"></small>
    </div>

    <div class="botones">
        <button type="submit" class="btn-enviar">REGISTRARSE</button>
        <button type="reset" class="btn-limpiar">LIMPIAR</button>
    </div>

</form>

<script src="script.js"></script>

</body>
</html>
